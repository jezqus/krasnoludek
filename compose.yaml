services:
  apache:
    build:
      context: .
      dockerfile: php_apache_dockerfile
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./htdocs:/var/www/html

  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
    # volumes:
    # - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8081:80
    environment:
      - PMA_ARBITRARY=1

